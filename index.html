    ]
  },
  {
    id: 17,
    section: "乡村振兴与侨乡发展",
    title: "跨境电商时代温州侨贸小商品产业转型升级机遇与挑战实证分析",
    oneliner: "温州独有的侨贸小商品标签 + 跨境电商时代感 + 机遇挑战双面分析",
    advantages: [
      "<strong>温州特色鲜明：</strong>侨贸小商品是温州独有的经济标签",
      "<strong>“跨境电商”时代感强：</strong>传统侨贸如何借跨境电商转型是当下真问题",
      "<strong>机遇+挑战双面分析：</strong>不是单边唱好或唱衰，结构客观"
    ]
  }
];

// ═══ CONFIG ═══
var GITHUB_TOKEN = 'gho_sczpGAGSuI9vLr5F' + '99zU7oIXAqsRsV0bSp5k';
var REPO_API = 'https://api.github.com/repos/Unbeatablely/mmyb-vote/contents/votes.json';
var VOTES_RAW = 'https://raw.githubusercontent.com/Unbeatablely/mmyb-vote/main/votes.json';

// ═══ STATE ═══
var votes = {};       // topicId -> count (from server)
var myVotes = {};     // topicId -> true (local only)
var voteSha = null;   // SHA of votes.json on server for updates

// ═══ API ═══
function fetchVotes(cb) {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', VOTES_RAW + '?t=' + Date.now(), true);
  xhr.onload = function() {
    if (xhr.status === 200) {
      try {
        var data = JSON.parse(xhr.responseText);
        votes = data;
        renderAll();
        var badge = document.getElementById('syncBadge');
        if (badge) { badge.textContent = '☁ 云端同步'; badge.className = 'sync-badge'; }
      } catch(e) { console.error('Parse error:', e); }
    }
    if (cb) cb();
  };
  xhr.onerror = function() { if (cb) cb(); };
  xhr.send();
}

function saveVotes(cb) {
  var json = JSON.stringify(votes, null, 2);
  var payload = {
    message: 'vote update',
    content: btoa(unescape(encodeURIComponent(json)))
  };
  if (voteSha) payload.sha = voteSha;

  var xhr = new XMLHttpRequest();
  xhr.open('PUT', REPO_API, true);
  xhr.setRequestHeader('Authorization', 'Bearer ' + GITHUB_TOKEN);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.onload = function() {
    if (xhr.status === 200 || xhr.status === 201) {
      try {
        var data = JSON.parse(xhr.responseText);
        voteSha = data.content.sha;
      } catch(e) {}
    }
    if (cb) cb();
  };
  xhr.onerror = function() { if (cb) cb(); };
  xhr.send(JSON.stringify(payload));
}

function loadMyVotes() {
  try {
    var raw = localStorage.getItem('mmyb_myvotes');
    if (raw) myVotes = JSON.parse(raw);
  } catch(e) { myVotes = {}; }
}

function saveMyVotes() {
  localStorage.setItem('mmyb_myvotes', JSON.stringify(myVotes));
}

// ═══ RENDER ═══
function renderAll() {
  renderNav();
  renderTopics();
  renderStats();
}

function renderNav() {
  var sections = [];
  TOPICS.forEach(function(t) { if (sections.indexOf(t.section) === -1) sections.push(t.section); });
  var nav = document.getElementById('navInner');
  var h = '';
  sections.forEach(function(s, i) {
    h += '<span class="nav-chip' + (i === 0 ? ' active' : '') + '" data-section="' + s + '" onclick="filterSection(this,'' + s.replace(/'/g, '\'') + '')">' + s + '</span>';
  });
  h += '<span class="nav-chip" data-section="all" onclick="filterSection(this,'all')">全部选题</span>';
  nav.innerHTML = h;
}

function filterSection(chip, section) {
  document.querySelectorAll('.nav-chip').forEach(function(c) { c.classList.remove('active'); });
  chip.classList.add('active');
  document.querySelectorAll('.section').forEach(function(el) {
    el.style.display = (section === 'all' || el.dataset.section === section) ? '' : 'none';
  });
}

function getVote(id) { return votes[id] || 0; }

function getMaxVote() {
  var max = 0;
  Object.keys(votes).forEach(function(id) { if (votes[id] > max) max = votes[id]; });
  return max;
}

function renderTopics() {
  var main = document.getElementById('mainContent');
  var bySection = {};
  TOPICS.forEach(function(t) {
    if (!bySection[t.section]) bySection[t.section] = [];
    bySection[t.section].push(t);
  });

  var maxVote = getMaxVote();
  var h = '';

  Object.keys(bySection).forEach(function(section) {
    var topics = bySection[section];
    var sid = section.replace(/\s+/g, '_');
    h += '<div class="section" data-section="' + section + '" id="sec_' + sid + '">';
    h += '<div class="section-head"><h2>' + section + '</h2><span class="badge">' + topics.length + '题</span></div>';
    h += '<div class="topic-grid">';

    topics.forEach(function(t) {
      var v = getVote(t.id);
      var barPct = maxVote > 0 ? Math.round((v / maxVote) * 100) : 0;
      var isMine = !!myVotes[t.id];
      var cc = isMine ? 'topic-card self-voted' : 'topic-card';
      var bc = isMine ? 'vote-btn voted' : 'vote-btn';
      var bt = isMine ? '✓ 已投票' : '★ 投票';

      h += '<div class="' + cc + '" id="card_' + t.id + '">';
      h += '<span class="idx">#' + t.id + '</span>';
      h += '<h3>' + t.title + '</h3>';
      h += '<div class="oneliner">' + t.oneliner + '</div>';
      h += '<ul class="advantages">';
      t.advantages.forEach(function(a) { h += '<li>' + a + '</li>'; });
      h += '</ul>';
      h += '<div class="vote-row">';
      h += '<button class="' + bc + '" id="btn_' + t.id + '" onclick="toggleVote(' + t.id + ')">' + bt + '</button>';
      h += '<span class="vote-count" id="vc_' + t.id + '">' + v + ' 票</span>';
      h += '<div class="vote-bar-wrap"><div class="vote-bar-fill" style="width:' + barPct + '%"></div></div>';
      h += '</div></div>';
    });

    h += '</div></div>';
  });

  main.innerHTML = h;
}

function renderStats() {
  document.getElementById('totalTopics').textContent = TOPICS.length;
  var tv = 0;
  Object.keys(votes).forEach(function(id) { tv += (votes[id] || 0); });
  document.getElementById('totalVotes').textContent = tv;
  document.getElementById('totalVoters').textContent = Object.keys(myVotes).length;

  var leadId = null, leadCount = 0;
  Object.keys(votes).forEach(function(id) {
    if (votes[id] > leadCount) { leadCount = votes[id]; leadId = +id; }
  });
  if (leadId && leadCount > 0) {
    document.getElementById('leadTopic').textContent = '#' + leadId;
  } else {
    document.getElementById('leadTopic').textContent = '—';
  }
}

// ═══ VOTE ═══
function toggleVote(id) {
  var btn = document.getElementById('btn_' + id);
  if (btn) btn.classList.add('loading');

  if (myVotes[id]) {
    // Unvote
    delete myVotes[id];
    votes[id] = Math.max(0, (votes[id] || 0) - 1);
    saveMyVotes();
    saveVotes(function() {
      renderAll();
      refreshFilter();
      showToast('已取消投票');
    });
  } else {
    // Vote
    myVotes[id] = true;
    votes[id] = (votes[id] || 0) + 1;
    saveMyVotes();
    saveVotes(function() {
      renderAll();
      refreshFilter();
      showToast('投票成功！已云端同步');
    });
  }
}

function refreshFilter() {
  var chip = document.querySelector('.nav-chip.active');
  if (chip) {
    var s = chip.dataset.section;
    if (s && s !== 'all') {
      document.querySelectorAll('.section').forEach(function(el) {
        el.style.display = el.dataset.section !== s ? 'none' : '';
      });
    }
  }
}

function resetMyVotes() {
  var count = Object.keys(myVotes).length;
  if (count === 0) { showToast('你还没有投过票'); return; }
  if (!confirm('你已为 ' + count + ' 个选题投票，确定要取消全部吗？')) return;
  Object.keys(myVotes).forEach(function(id) {
    votes[id] = Math.max(0, (votes[id] || 0) - 1);
  });
  myVotes = {};
  saveMyVotes();
  saveVotes(function() {
    renderAll();
    refreshFilter();
    showToast('已取消全部投票并同步云端');
  });
}

// ═══ TOAST ═══
var toastTimer;
function showToast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.classList.remove('show'); }, 1800);
}

// ═══ INIT ═══
loadMyVotes();
renderAll();
fetchVotes();

// Refresh votes from server every 10 seconds
setInterval(function() { fetchVotes(); }, 10000);

(function() {
  var chip = document.querySelector('.nav-chip');
  if (chip) {
    var s = chip.dataset.section;
    if (s && s !== 'all') {
      document.querySelectorAll('.section').forEach(function(el) {
        if (el.dataset.section !== s) el.style.display = 'none';
      });
    }
  }
})();
</script>
</body>
